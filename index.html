<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Base Group Limited — Site Under Construction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --olive: #465b3c;
        --burgundy: #5a1f2c;
        --gold: #c7a14a;
        --linen: #f5f1e8;
        --espresso: #2b241f;
        --stone: #c9c4ba;
        --olive-leaf: #708a4d;
        --copper: #a16b3a;
        --plum: #4a1e2e;
        --champagne: #e4d5a4;
        --sage: #bcc5ae;
        --paper: #fbfaf6;
        --ink: #2b241f;
        --serif: "Cormorant Garamond", Georgia, serif;
        --sans: "Jost", system-ui, sans-serif;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        font-weight: 300;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
        position: relative;
      }

      /* ===== NAV (from the brand site — logo only, no links) ===== */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 18px clamp(20px, 4vw, 48px);
        background: rgba(251, 250, 246, 0.82);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(43, 36, 31, 0.08);
        opacity: 0;
        transform: translateY(-12px);
        animation: navIn 1.1s cubic-bezier(0.2, 0.7, 0.2, 1) 0.1s forwards;
      }
      .topbar .brandmark {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar .brand-logo {
        height: 40px;
        width: auto;
        display: block;
      }
      @media (max-width: 640px) {
        .topbar .brand-logo {
          height: 32px;
        }
      }

      /* ===== ambient background: subtle estate gradient + meridian graticule ===== */
      .field {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        background:
          radial-gradient(
            1200px 700px at 50% -10%,
            rgba(112, 138, 77, 0.1),
            transparent 60%
          ),
          radial-gradient(
            900px 600px at 85% 110%,
            rgba(199, 161, 74, 0.08),
            transparent 55%
          ),
          linear-gradient(160deg, #fbfaf6 0%, #f5f1e8 55%, #efe9db 100%);
      }
      .field .grat {
        position: absolute;
        inset: -10%;
        opacity: 0.5;
        animation: drift 34s ease-in-out infinite alternate;
      }
      @keyframes drift {
        from {
          transform: translate3d(0, 0, 0) scale(1);
        }
        to {
          transform: translate3d(-2%, -1.5%, 0) scale(1.05);
        }
      }

      /* ===== center stage ===== */
      .stage {
        position: relative;
        z-index: 2;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 120px 24px 80px;
        gap: 0;
      }

      /* ===== gear cluster ===== */
      .gears {
        position: relative;
        width: 230px;
        height: 200px;
        margin-bottom: 56px;
        opacity: 0;
        transform: scale(0.82);
        animation: gearsIn 1.3s cubic-bezier(0.2, 0.8, 0.2, 1) 0.35s forwards;
      }
      .gears-float {
        position: relative;
        width: 100%;
        height: 100%;
        animation: float 7s ease-in-out infinite;
        animation-delay: 1.6s;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-7px);
        }
      }
      .gear {
        position: absolute;
        transform-origin: 50% 50%;
      }
      .gear svg {
        display: block;
        overflow: visible;
        filter: drop-shadow(0 6px 14px rgba(43, 36, 31, 0.16));
      }
      .gear.g1 {
        top: 14px;
        left: 44px;
        width: 132px;
        height: 132px;
        animation: spin 14s linear infinite;
      }
      .gear.g2 {
        top: 78px;
        left: 126px;
        width: 88px;
        height: 88px;
        animation: spinR 9.03s linear infinite;
      }
      .gear.g3 {
        top: 100px;
        left: 24px;
        width: 60px;
        height: 60px;
        animation: spinR 6.16s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes spinR {
        to {
          transform: rotate(-360deg);
        }
      }

      /* soft breathing glow behind gears */
      .gears::before {
        content: "";
        position: absolute;
        inset: -40px;
        z-index: -1;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(199, 161, 74, 0.18),
          transparent 68%
        );
        animation: pulse 5.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.55;
          transform: scale(0.94);
        }
        50% {
          opacity: 1;
          transform: scale(1.06);
        }
      }

      /* ===== copy ===== */
      .kicker {
        font-family: var(--sans);
        font-weight: 500;
        font-size: 0.72rem;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 26px;
        opacity: 0;
        animation: rise 1s ease 0.7s forwards;
      }
      .headline {
        font-family: var(--serif);
        font-weight: 300;
        letter-spacing: -0.01em;
        line-height: 1.02;
        font-size: clamp(2.6rem, 7vw, 5.2rem);
        color: var(--olive);
        opacity: 0;
        animation: rise 1.1s cubic-bezier(0.2, 0.7, 0.2, 1) 0.85s forwards;
      }
      .headline em {
        font-style: italic;
        color: var(--copper);
      }
      .rule {
        width: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        margin: 34px auto 0;
        animation: ruleGrow 1.4s cubic-bezier(0.2, 0.7, 0.2, 1) 1.15s forwards;
      }
      @keyframes ruleGrow {
        to {
          width: min(260px, 60vw);
        }
      }
      .sub {
        font-family: var(--serif);
        font-style: italic;
        font-size: clamp(1.05rem, 2.2vw, 1.4rem);
        color: #6e665c;
        margin-top: 26px;
        max-width: 36ch;
        opacity: 0;
        animation: rise 1.1s ease 1.3s forwards;
      }

      /* ===== progress shimmer ===== */
      .track {
        position: relative;
        width: min(300px, 64vw);
        height: 2px;
        border-radius: 2px;
        margin-top: 44px;
        background: rgba(43, 36, 31, 0.1);
        overflow: hidden;
        opacity: 0;
        animation: rise 1s ease 1.5s forwards;
      }
      .track .bar {
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          var(--champagne),
          var(--gold),
          transparent
        );
        animation: sweep 2.6s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        animation-delay: 2s;
      }
      @keyframes sweep {
        0% {
          left: -45%;
        }
        100% {
          left: 105%;
        }
      }

      /* footer tagline */
      .foot {
        position: fixed;
        bottom: 26px;
        left: 0;
        right: 0;
        z-index: 2;
        text-align: center;
        font-family: var(--sans);
        font-size: 0.62rem;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--stone);
        opacity: 0;
        animation: rise 1s ease 1.7s forwards;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes navIn {
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes gearsIn {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.001s !important;
          animation-iteration-count: 1 !important;
        }
        .gear.g1,
        .gear.g2,
        .gear.g3 {
          animation: none;
        }
        .track .bar {
          animation: none;
          left: 0;
          width: 100%;
          opacity: 0.5;
        }
      }
    </style>
  </head>
